<article class="post-row">
  <p class="entry-date">{{ .Date.Format "Jan. 2, 2006" }}</p>

  <h2 class="entry-title"><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>

  {{ with .Params.image }}
    <a class="post-thumb-link" href="{{ $.RelPermalink }}" aria-label="Thumbnail for {{ $.Title }}">
      <img class="post-thumb" src="{{ . }}" alt="" loading="lazy" />
    </a>
  {{ end }}

  <p class="entry-excerpt">{{ .Summary | plainify | truncate 320 }}</p>

  <p class="meta">
    <span>{{ .Date.Format "3:04 pm" }}</span>
    {{ with .Params.tags }}
      <span> / </span>
      {{ range $i, $tag := . }}
        {{ if gt $i 0 }}<span>, </span>{{ end }}
        <a href="{{ "/tags/" | relLangURL }}{{ $tag | urlize }}/">{{ $tag }}</a>
      {{ end }}
    {{ end }}
  </p>
</article>
