{{ define "main" }}
  <article class="shell article">
    <header class="article-head">
      <h1>{{ .Title }}</h1>
      <p class="meta">{{ .Date.Format "January 2, 2006" }}</p>
      {{ with .Params.tags }}
        <p class="meta">
          {{ range $i, $tag := . }}{{ if gt $i 0 }} · {{ end }}{{ $tag }}{{ end }}
        </p>
      {{ end }}
    </header>

    <div class="prose">
      {{ .Content }}
    </div>
  </article>
{{ end }}
